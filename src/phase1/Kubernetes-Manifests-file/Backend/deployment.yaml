# Backend API Deployment
# Modified for KPS-Enterprise with Docker Hub images (ECR is read-only in Learner Lab)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: three-tier
  labels:
    role: api
    env: demo
    app: kps-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels:
      role: api
  template:
    metadata:
      labels:
        role: api
    spec:
      # NOTE: Remove imagePullSecrets if using public Docker Hub images
      # Uncomment below line if using private Docker Hub repository
      # imagePullSecrets:
      # - name: dockerhub-secret
      containers:
      - name: api
        # IMPORTANT: Change DOCKERHUB_USER to your Docker Hub username
        # This will be auto-updated by Jenkins pipeline
        image: akawatmor/kps-backend:3
        imagePullPolicy: Always
        env:
          - name: MONGO_CONN_STR
            value: mongodb://mongodb-svc:27017/todo?directConnection=true&authSource=admin&authSource=admin&authSource=admin
          - name: USE_DB_AUTH
            value: "true"
          - name: MONGO_USERNAME
            valueFrom:
              secretKeyRef:
                name: mongo-sec
                key: username
          - name: MONGO_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mongo-sec
                key: password
        ports:
        - containerPort: 3500
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3500
          initialDelaySeconds: 2
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 3500
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /started
            port: 3500
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 30
