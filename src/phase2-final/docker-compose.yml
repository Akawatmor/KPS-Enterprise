services:
  core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todoapp-core
    env_file: .env
    environment:
      SERVER_PORT: "8080"
      DATA_BACKEND: sqlite
      SQLITE_PATH: /var/lib/todoapp/todoapp.db
      ALLOWED_ORIGIN: "http://localhost:3000"
    volumes:
      - sqlite-data:/var/lib/todoapp
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked at build time — Next.js NEXT_PUBLIC_ vars are embedded during `npm run build`.
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    container_name: todoapp-web
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite-data:
    name: todoapp-sqlite-data
