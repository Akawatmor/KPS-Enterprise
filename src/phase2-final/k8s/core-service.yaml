apiVersion: v1
kind: Service
metadata:
  name: todoapp-core
  namespace: todoapp
  labels:
    app: todoapp-core
spec:
  # Compatibility alias: if anything still calls todoapp-core directly,
  # send it to stable only so legacy and canary pods do not get mixed.
  selector:
    app: todoapp-core
    track: stable
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
