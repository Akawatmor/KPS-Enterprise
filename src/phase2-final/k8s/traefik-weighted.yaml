# Canary deployment — 0 replicas at rest; scaled to 1 during pipeline canary phase
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-core-canary
  namespace: todoapp
  labels:
    app: todoapp-core
    track: canary
    app.kubernetes.io/part-of: todoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todoapp-core
      track: canary
  template:
    metadata:
      labels:
        app: todoapp-core
        track: canary
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
      containers:
        - name: core
          image: akawatmor/todoapp-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: todoapp-config
            - secretRef:
                name: todoapp-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 400m
              memory: 256Mi
              ephemeral-storage: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Stable deployment — receives 100% traffic in steady state
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-core-stable
  namespace: todoapp
  labels:
    app: todoapp-core
    track: stable
    app.kubernetes.io/part-of: todoapp
spec:
  #replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: todoapp-core
      track: stable
  template:
    metadata:
      labels:
        app: todoapp-core
        app.kubernetes.io/part-of: todoapp
        track: stable
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
      containers:
        - name: core
          image: akawatmor/todoapp-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: todoapp-config
            - secretRef:
                name: todoapp-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 400m
              memory: 256Mi
              ephemeral-storage: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# TraefikService — weighted load balancer between stable (100%) and canary (0%)
# Pipeline patches weights during canary deploy / promote / rollback
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: todoapp-core-weighted
  namespace: todoapp
spec:
  weighted:
    services:
      - name: todoapp-core-stable
        port: 8080
        weight: 100
      - name: todoapp-core-canary
        port: 8080
        weight: 0
