apiVersion: v1
kind: Service
metadata:
  name: todoapp-postgres
  namespace: todoapp
  labels:
    app: todoapp-postgres
    component: database
    tier: data
spec:
  clusterIP: None              # ← Headless service (สำคัญสำหรับ StatefulSet)
  selector:
    app: todoapp-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432