apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todoapp

resources:
  - namespace.yaml
  - configmap.yaml
  # NOTE: Do NOT apply secret.sample.yaml directly.
  # Create the real secret first:
  #   kubectl create secret generic todoapp-secret -n todoapp \
  #     --from-literal=GITHUB_OAUTH_CLIENT_ID=<id> \
  #     --from-literal=GITHUB_OAUTH_CLIENT_SECRET=<secret>
  # - secret.sample.yaml
  - core-pvc.yaml
  - core-deployment.yaml
  - core-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ingress.yaml
