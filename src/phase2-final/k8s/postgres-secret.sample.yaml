# DO NOT commit real passwords. Replace ALL placeholders before applying.
#
# Step 1 — Create the postgres pod secret (password used by the DB container):
#   kubectl create secret generic todoapp-postgres-secret -n todoapp \
#     --from-literal=POSTGRES_PASSWORD=<strong-random-password>
#
# Step 2 — Patch todoapp-secret to include the DSN (same password as above):
#   kubectl create secret generic todoapp-secret -n todoapp \
#     --from-literal=GITHUB_OAUTH_CLIENT_ID=<id> \
#     --from-literal=GITHUB_OAUTH_CLIENT_SECRET=<secret> \
#     --from-literal=POSTGRES_DSN="postgres://todoapp:<same-password>@todoapp-postgres:5432/todoapp?sslmode=disable" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# DSN format:
#   postgres://<POSTGRES_USER>:<POSTGRES_PASSWORD>@<svc-name>:<port>/<POSTGRES_DB>?sslmode=disable
#   Service name: todoapp-postgres  (same namespace — short DNS works)
apiVersion: v1
kind: Secret
metadata:
  name: todoapp-postgres-secret
  namespace: todoapp
type: Opaque
stringData:
  POSTGRES_PASSWORD: "replace-me"
