# DO NOT commit real secrets. Replace placeholders before applying.
# Create the actual secret with:
#   kubectl create secret generic todoapp-secret -n todoapp \
#     --from-literal=GITHUB_OAUTH_CLIENT_ID=<your-id> \
#     --from-literal=GITHUB_OAUTH_CLIENT_SECRET=<your-secret>
apiVersion: v1
kind: Secret
metadata:
  name: todoapp-secret
  namespace: todoapp
type: Opaque
stringData:
  GITHUB_OAUTH_CLIENT_ID: "replace-me"
  GITHUB_OAUTH_CLIENT_SECRET: "replace-me"
  # Connection string — password must match POSTGRES_PASSWORD in todoapp-postgres-secret.
  POSTGRES_DSN: "postgres://todoapp:replace-me@todoapp-postgres:5432/todoapp?sslmode=disable"
