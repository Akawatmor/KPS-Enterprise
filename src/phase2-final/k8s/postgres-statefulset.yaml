apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todoapp-postgres
  namespace: todoapp
  labels:
    app: todoapp-postgres
    component: database
    tier: data
spec:
  serviceName: todoapp-postgres
  replicas: 1
  selector:
    matchLabels:
      app: todoapp-postgres
  template:
    metadata:
      labels: 
        app: todoapp-postgres
        component: database
        tier: data
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # postgres user UID
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: todoapp-postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }

          # ── Fix A: probe แยกกัน ──────────────────────────
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 30      # ← เช็คห่างๆ เพราะ heavy
            timeoutSeconds: 10
            failureThreshold: 6    # ← ใจดี ให้ retry นาน
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-h", "127.0.0.1"]
            initialDelaySeconds: 5
            periodSeconds: 5       # ← เช็คถี่ๆ
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            periodSeconds: 5
            failureThreshold: 30   # ← รอได้สูงสุด 150s ตอน startup ครั้งแรก

          # ── Fix B: readOnlyRootFilesystem + writable volumes ──
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql

      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi