# K3s uses Traefik as the default ingress controller.
# Keep the plain Ingress focused on the frontend catch-all route.
# Backend traffic is handled by a Traefik IngressRoute so it can consume
# the weighted TraefikService for stable/canary rollout control.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todoapp
  namespace: todoapp
  annotations:
    # Traefik (K3s default ingress)
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: todoapp-kps.akawatmor.com
      http:
        paths:
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todoapp-web
                port:
                  number: 80
