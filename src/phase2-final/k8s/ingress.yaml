# K3s uses Traefik as the default ingress controller.
# This ingress routes /api and health paths to the core service,
# and all other paths to the frontend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todoapp
  namespace: todoapp
  annotations:
    # Traefik (K3s default ingress)
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Strip the /api prefix before forwarding to the backend.
    traefik.ingress.kubernetes.io/router.middlewares: todoapp-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: todoapp.local
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: todoapp-core
                port:
                  number: 8080
          # Health endpoints
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: todoapp-core
                port:
                  number: 8080
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: todoapp-core
                port:
                  number: 8080
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todoapp-web
                port:
                  number: 80
