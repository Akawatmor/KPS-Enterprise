# Dedicated ClusterIP services for canary/stable traffic splitting via TraefikService
apiVersion: v1
kind: Service
metadata:
  name: todoapp-core-canary
  namespace: todoapp
  labels:
    app: todoapp-core
    track: canary
    app.kubernetes.io/part-of: todoapp
spec:
  selector:
    app: todoapp-core
    track: canary
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: todoapp-core-stable
  namespace: todoapp
  labels:
    app: todoapp-core
    track: stable
    app.kubernetes.io/part-of: todoapp
spec:
  selector:
    app: todoapp-core
    track: stable
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
