apiVersion: v1
kind: PersistentVolume
metadata:
  name: todoapp-postgres-pv
  labels:
    app: todoapp-postgres
    type: iscsi
spec:
  capacity:
    storage: 16Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: "" # Use empty string for static provisioning
  volumeMode: Filesystem
  iscsi:
    targetPortal: 192.168.111.10:3260
    iqn: iqn.2000-01.com.synology:PetchSynologyV2.default-target.98f26b345a8
    lun: 1
    fsType: ext4
    readOnly: false
    chapAuthDiscovery: false
    chapAuthSession: false
