apiVersion: v1
kind: ConfigMap
metadata:
  name: todoapp-config
  namespace: todoapp
data:
  SERVER_PORT: "8080"
  DATA_BACKEND: "sqlite"
  SQLITE_PATH: "/var/lib/todoapp/todoapp.db"
  NAGGER_TICK_SECONDS: "30"
  CALDAV_TICK_SECONDS: "60"
  AUTH_ACCESS_TOKEN_MINUTES: "15"
  AUTH_REFRESH_TOKEN_MINUTES: "10080"
  # ALLOWED_ORIGIN is set to the frontend ingress hostname.
  # Update this to match your actual domain.
  ALLOWED_ORIGIN: "http://todoapp.local"
