apiVersion: v1
kind: ConfigMap
metadata:
  name: todoapp-config
  namespace: todoapp
data:
  SERVER_PORT: "8080"
  DATA_BACKEND: "postgres"
  NAGGER_TICK_SECONDS: "30"
  CALDAV_TICK_SECONDS: "60"
  AUTH_ACCESS_TOKEN_MINUTES: "15"
  AUTH_REFRESH_TOKEN_MINUTES: "10080"
  # ALLOWED_ORIGIN must match the frontend domain for CORS.
  ALLOWED_ORIGIN: "https://todoapp-kps.akawatmor.com"
  # ── Feature flags — read by backend/frontend via env ─────────────────────
  # Set "true"/"false" and apply ConfigMap; pods pick up new value on restart.
  FEATURE_DARK_MODE: "false"
  FEATURE_CALDAV_SYNC: "true"
  FEATURE_MULTI_ASSIGN: "false"
