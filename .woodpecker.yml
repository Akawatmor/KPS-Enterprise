# .woodpecker.yml
# Woodpecker CI Pipeline for KPS-Enterprise
# เทียบเท่า Jenkinsfile เดิม แต่ใช้ Woodpecker syntax

when:
  branch: main
  event: [push, pull_request]

steps:
  # ═══════════════════════════════════
  # Backend Pipeline
  # ═══════════════════════════════════

  backend-test:
    image: node:14
    directory: docker/backend
    commands:
      - npm install
      - echo "Backend dependencies installed successfully"
    when:
      path:
        include:
          - "docker/backend/**"
          - ".woodpecker.yml"

  backend-security-scan:
    image: aquasec/trivy:latest
    commands:
      - trivy fs --severity HIGH,CRITICAL --exit-code 0 docker/backend/
    when:
      path:
        include:
          - "docker/backend/**"

  backend-build:
    image: plugins/docker
    privileged: true
    settings:
      repo: akawatmor/kps-backend
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      dockerfile: docker/backend/Dockerfile
      context: docker/backend
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      event: push
      branch: main
      path:
        include:
          - "docker/backend/**"

  # ═══════════════════════════════════
  # Frontend Pipeline
  # ═══════════════════════════════════

  frontend-test:
    image: node:14
    directory: docker/frontend
    commands:
      - npm install
      - echo "Frontend dependencies installed successfully"
    when:
      path:
        include:
          - "docker/frontend/**"
          - ".woodpecker.yml"

  frontend-security-scan:
    image: aquasec/trivy:latest
    commands:
      - trivy fs --severity HIGH,CRITICAL --exit-code 0 docker/frontend/
    when:
      path:
        include:
          - "docker/frontend/**"

  frontend-build:
    image: plugins/docker
    privileged: true
    settings:
      repo: akawatmor/kps-frontend
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      dockerfile: docker/frontend/Dockerfile
      context: docker/frontend
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      event: push
      branch: main
      path:
        include:
          - "docker/frontend/**"

  # ═══════════════════════════════════
  # Deploy to K3s
  # ═══════════════════════════════════

  deploy:
    image: bitnami/kubectl:latest
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" > ~/.kube/config
      - chmod 600 ~/.kube/config
      # Restart deployments เพื่อ pull image ใหม่ (imagePullPolicy: Always)
      - kubectl rollout restart deployment/api -n three-tier
      - kubectl rollout restart deployment/frontend -n three-tier
      # รอให้ rollout เสร็จ
      - kubectl rollout status deployment/api -n three-tier --timeout=120s
      - kubectl rollout status deployment/frontend -n three-tier --timeout=120s
    environment:
      KUBECONFIG_CONTENT:
        from_secret: k3s_kubeconfig
    when:
      event: push
      branch: main