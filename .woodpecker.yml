when:
  - event: [push, pull_request]
    branch: main

steps:
  # ═══════════════════════════════════
  # Backend Pipeline
  # ═══════════════════════════════════
  backend-test:
    image: node:14
    commands:
      - cd docker/backend
      - npm install
      - echo "Backend dependencies installed successfully"
    when:
      - event: [push, pull_request]
        path:
          include:
            - "docker/backend/**"
            - ".woodpecker.yml"

  backend-security-scan:
    image: aquasec/trivy:latest
    commands:
      - trivy fs --severity HIGH,CRITICAL --exit-code 0 docker/backend/
    when:
      - event: [push, pull_request]
        path:
          include:
            - "docker/backend/**"

  backend-build:
    image: plugins/docker
    settings:
      repo: akawatmor/kps-backend
      tags:
        - latest
        - "${CI_COMMIT_SHA}"
      dockerfile: docker/backend/Dockerfile
      context: docker/backend
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on:
      - backend-test
      - backend-security-scan
    when:
      - event: push
        branch: main
        path:
          include:
            - "docker/backend/**"

  # ═══════════════════════════════════
  # Frontend Pipeline
  # ═══════════════════════════════════
  frontend-test:
    image: node:14
    commands:
      - cd docker/frontend
      - npm install
      - echo "Frontend dependencies installed successfully"
    when:
      - event: [push, pull_request]
        path:
          include:
            - "docker/frontend/**"
            - ".woodpecker.yml"

  frontend-security-scan:
    image: aquasec/trivy:latest
    commands:
      - trivy fs --severity HIGH,CRITICAL --exit-code 0 docker/frontend/
    when:
      - event: [push, pull_request]
        path:
          include:
            - "docker/frontend/**"

  frontend-build:
    image: plugins/docker
    settings:
      repo: akawatmor/kps-frontend
      tags:
        - latest
        - "${CI_COMMIT_SHA}"
      dockerfile: docker/frontend/Dockerfile
      context: docker/frontend
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on:
      - frontend-test
      - frontend-security-scan
    when:
      - event: push
        branch: main
        path:
          include:
            - "docker/frontend/**"

  # ═══════════════════════════════════
  # Deploy to K3s
  # ═══════════════════════════════════
  deploy:
    image: bitnami/kubectl:latest
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" > ~/.kube/config
      - chmod 600 ~/.kube/config
      - kubectl rollout restart deployment/api -n three-tier
      - kubectl rollout restart deployment/frontend -n three-tier
      - kubectl rollout status deployment/api -n three-tier --timeout=120s
      - kubectl rollout status deployment/frontend -n three-tier --timeout=120s
    environment:
      KUBECONFIG_CONTENT:
        from_secret: k3s_kubeconfig
    depends_on:
      - backend-build
      - frontend-build
    when:
      - event: push
        branch: main