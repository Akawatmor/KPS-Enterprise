# ─────────────────────────────────────────────────────────────────────────────
# Woodpecker CI/CD Pipeline — TodoApp Big Calendar (Phase 2)
# ─────────────────────────────────────────────────────────────────────────────
#
# Infrastructure : K3s 3-node (1 master + 2 workers) · Docker Hub · Woodpecker
# App source     : src/phase2-final/
#
# Branch strategy
# ───────────────
#   develop  → quality gates only (tests, typecheck, static analysis)
#   main     → quality gates → build → push → scan → deploy → smoke → notify
#
# Required secrets
# ────────────────
#   DOCKER_USERNAME   Docker Hub username
#   DOCKER_PASSWORD   Docker Hub access token
#   KUBECONFIG_B64    base64-encoded kubeconfig for K3s master
#   SMTP_HOST         SMTP server hostname (e.g. smtp.gmail.com)
#   SMTP_USERNAME     Sender email address
#   SMTP_PASSWORD     App-specific password (Gmail: 16-char app password)
#   NOTIFY_EMAIL      Comma-separated recipient(s)
# ─────────────────────────────────────────────────────────────────────────────

variables:
  - &go_image       "golang:1.25-bookworm"
  - &node_image     "node:22-bookworm-slim"
  - &kubectl_image  "bitnami/kubectl:1.31"
  - &trivy_image    "aquasec/trivy:0.62"
  - &buildx_image   "woodpeckerci/plugin-docker-buildx:4"
  - &curl_image     "curlimages/curl:8.12.1"
  - &email_image    "drillster/drone-email"
  - &lhci_image     "patrickhulce/lhci:0.14"

# ─────────────────────────────────────────────────────────────────────────────

steps:

  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 1 — QUALITY GATES  (develop + main)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 1. Backend · Tests + vet + security + vulncheck (combined) ─────────────
  #    Combines: go vet, go test, gosec, govulncheck into ONE step
  #    → eliminates 3x redundant go mod download + container startup
  - name: quality-backend
    image: *go_image
    depends_on: []
    when:
      event: [push, pull_request]
      branch: [main, develop]
    commands:
      - cd src/phase2-final/backend
      - go mod download

      # ── Vet ──
      - echo "══ go vet ══"
      - go vet ./...

      # ── Unit tests (no -race flag → saves ~60% memory) ──
      - echo "══ go test ══"
      - |
        go test ./... \
          -v \
          -count=1 \
          -coverprofile=coverage.out
      - go tool cover -func=coverage.out | tail -1

      # ── gosec (static security — OWASP) ──  [main only gate below]
      - echo "══ gosec ══"
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - gosec -severity medium -confidence medium -fmt=text ./... || echo "⚠ gosec issues found (non-blocking on develop)"

      # ── govulncheck (dependency CVE — OWASP A06) ──
      - echo "══ govulncheck ══"
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - govulncheck ./... || echo "⚠ vulns found (non-blocking on develop)"

  # ── 2. Frontend · Typecheck + test + audit (combined) ─────────────────────
  #    Combines: npm ci, type-check, test, audit into ONE step
  #    → eliminates 2x redundant npm ci + container startup
  - name: quality-frontend
    image: *node_image
    depends_on: []
    when:
      event: [push, pull_request]
      branch: [main, develop]
    commands:
      - cd src/phase2-final/frontend

      # ── Install once, reuse everywhere ──
      - npm ci --prefer-offline

      # ── TypeScript type-check ──
      - echo "══ type-check ══"
      - npm run type-check

      # ── Unit tests ──
      - echo "══ unit tests ══"
      - npm test -- --passWithNoTests

      # ── Dependency audit (OWASP A06) ──
      - echo "══ npm audit ══"
      - npm audit --audit-level=high || echo "⚠ audit issues found (non-blocking on develop)"


  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 2 — BUILD & PUSH  (main only)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 3. Build & push · Backend image ────────────────────────────────────────
  - name: build-push-core
    image: *buildx_image
    privileged: true
    depends_on: [quality-backend]
    when:
      event: push
      branch: main
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
    settings:
      dockerfile: src/phase2-final/backend/Dockerfile
      context: src/phase2-final/backend
      repo: ${DOCKER_USERNAME}/todoapp-core
      tags:
        - "${CI_COMMIT_SHA:0:7}"
        - latest
      cache_from: ${DOCKER_USERNAME}/todoapp-core:latest
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD

  # ── 4. Build & push · Frontend image ──────────────────────────────────────
  - name: build-push-web
    image: *buildx_image
    privileged: true
    depends_on: [quality-frontend]
    when:
      event: push
      branch: main
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
    settings:
      dockerfile: src/phase2-final/frontend/Dockerfile
      context: src/phase2-final/frontend
      repo: ${DOCKER_USERNAME}/todoapp-web
      tags:
        - "${CI_COMMIT_SHA:0:7}"
        - latest
      cache_from: ${DOCKER_USERNAME}/todoapp-web:latest
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD


  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 3 — IMAGE VULNERABILITY SCAN  (main only)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 5. Trivy · Scan BOTH images in one step ───────────────────────────────
  #    → downloads Trivy DB once instead of twice
  - name: trivy-scan
    image: *trivy_image
    depends_on:
      - build-push-core
      - build-push-web
    when:
      event: push
      branch: main
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
      TRIVY_USERNAME:
        from_secret: DOCKER_USERNAME
      TRIVY_PASSWORD:
        from_secret: DOCKER_PASSWORD
    commands:
      - echo "══ Scanning backend image ══"
      - |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format table \
          ${DOCKER_USERNAME}/todoapp-core:${CI_COMMIT_SHA:0:7}

      - echo "══ Scanning frontend image ══"
      - |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format table \
          ${DOCKER_USERNAME}/todoapp-web:${CI_COMMIT_SHA:0:7}

  # ── 6. Lighthouse CI · Performance & accessibility audit ───────────────────
  - name: lighthouse
    image: *lhci_image
    depends_on: [build-push-web]
    when:
      event: push
      branch: main
    commands:
      - cd src/phase2-final/frontend
      - lhci autorun --upload.target=temporary-public-storage || true


  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 4 — DEPLOY TO K3s  (main only)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 7. Deploy · Apply manifests & rolling update ───────────────────────────
  - name: deploy-k3s
    image: *kubectl_image
    depends_on:
      - trivy-scan
      - lighthouse
    when:
      event: push
      branch: main
    environment:
      KUBECONFIG_B64:
        from_secret: KUBECONFIG_B64
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - trap 'shred -u /tmp/kubeconfig 2>/dev/null || rm -f /tmp/kubeconfig' EXIT

      - kubectl cluster-info
      - echo "── Target cluster reachable ──"

      # ── 1. Namespace ──
      - kubectl apply -f src/phase2-final/k8s/namespace.yaml

      # ── 2. Database layer ──
      - kubectl apply -f src/phase2-final/k8s/postgres-statefulset.yaml
      - kubectl rollout status statefulset/todoapp-postgres -n todoapp --timeout=120s

      # ── 3. Application manifests (idempotent) ──
      - kubectl apply -f src/phase2-final/k8s/configmap.yaml
      - kubectl apply -f src/phase2-final/k8s/core-deployment.yaml
      - kubectl apply -f src/phase2-final/k8s/core-service.yaml
      - kubectl apply -f src/phase2-final/k8s/web-deployment.yaml
      - kubectl apply -f src/phase2-final/k8s/web-service.yaml
      - kubectl apply -f src/phase2-final/k8s/ingress.yaml

      # ── 4. Roll out new image tags ──
      - |
        kubectl set image deployment/todoapp-core \
          core=${DOCKER_USERNAME}/todoapp-core:${CI_COMMIT_SHA:0:7} \
          -n todoapp
      - |
        kubectl set image deployment/todoapp-web \
          web=${DOCKER_USERNAME}/todoapp-web:${CI_COMMIT_SHA:0:7} \
          -n todoapp

      # ── 5. Await zero-downtime rollout ──
      - kubectl rollout status deployment/todoapp-core -n todoapp --timeout=180s
      - kubectl rollout status deployment/todoapp-web  -n todoapp --timeout=180s
      - echo "── Deploy complete ──"


  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 5 — SMOKE TEST  (main only)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 8. Smoke test · healthz → readyz → write → read ───────────────────────
  - name: smoke-test
    image: *kubectl_image
    depends_on: [deploy-k3s]
    when:
      event: push
      branch: main
    environment:
      KUBECONFIG_B64:
        from_secret: KUBECONFIG_B64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - trap 'shred -u /tmp/kubeconfig 2>/dev/null || rm -f /tmp/kubeconfig' EXIT

      - sleep 10

      # a. GET /healthz → 200
      - |
        kubectl run smoke-a-${CI_COMMIT_SHA:0:7} \
          --image=curlimages/curl:8.12.1 \
          --restart=Never --rm -i --wait \
          --timeout=60s \
          -n todoapp \
          -- curl -sf --retry 3 --retry-delay 5 http://todoapp-core:8080/healthz
      - echo "✓ healthz"

      # b. GET /readyz → 200
      - |
        kubectl run smoke-b-${CI_COMMIT_SHA:0:7} \
          --image=curlimages/curl:8.12.1 \
          --restart=Never --rm -i --wait \
          --timeout=60s \
          -n todoapp \
          -- curl -sf --retry 3 --retry-delay 5 http://todoapp-core:8080/readyz
      - echo "✓ readyz"

      # c. POST /api/v1/tasks → 201
      - |
        kubectl run smoke-c-${CI_COMMIT_SHA:0:7} \
          --image=curlimages/curl:8.12.1 \
          --restart=Never --rm -i --wait \
          --timeout=60s \
          -n todoapp \
          -- curl -sf --retry 3 --retry-delay 5 \
          -X POST \
          -H "Content-Type: application/json" \
          -H "X-User-ID: smoke-test" \
          -d '{"title":"smoke-${CI_COMMIT_SHA:0:7}","column":"todo"}' \
          http://todoapp-core:8080/api/v1/tasks
      - echo "✓ POST /tasks"

      # d. GET /api/v1/tasks → 200
      - |
        kubectl run smoke-d-${CI_COMMIT_SHA:0:7} \
          --image=curlimages/curl:8.12.1 \
          --restart=Never --rm -i --wait \
          --timeout=60s \
          -n todoapp \
          -- curl -sf --retry 3 --retry-delay 5 \
          -H "X-User-ID: smoke-test" \
          http://todoapp-core:8080/api/v1/tasks
      - echo "✓ GET /tasks"

      - echo "── All smoke tests passed ──"


  # ═══════════════════════════════════════════════════════════════════════════
  #  STAGE 6 — NOTIFICATIONS  (main only)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 9. Email · Success notification ────────────────────────────────────────
  - name: email-success
    image: *email_image
    depends_on: [smoke-test]
    when:
      - event: push
        branch: main
        status: [success]
    settings:
      host:
        from_secret: SMTP_HOST
      port: 587
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_PASSWORD
      from:
        from_secret: SMTP_USERNAME
      recipients:
        from_secret: NOTIFY_EMAIL
      recipients_only: true
      subject: >-
        ✅ [KPS] Deploy สำเร็จ — ${CI_REPO_NAME}
        @ ${CI_COMMIT_BRANCH}:${CI_COMMIT_SHA:0:7}
      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
                     max-width:600px;margin:0 auto;padding:24px;color:#1f2937">
          <div style="background:#f0fdf4;border-left:4px solid #22c55e;padding:16px;margin-bottom:24px">
            <h2 style="color:#15803d;margin:0">✅ Pipeline Passed</h2>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px">
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;width:120px">Repository</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_REPO_NAME}</code></td>
            </tr>
            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Branch</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_BRANCH}</code></td>
            </tr>
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Commit</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_SHA:0:7}</code></td>
            </tr>
            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Author</td>
              <td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_AUTHOR}</td>
            </tr>
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Message</td>
              <td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_MESSAGE}</td>
            </tr>
          </table>
          <div style="margin-top:20px;padding:16px;background:#f0f9ff;border-radius:8px;font-size:14px">
            <strong>Pipeline Flow:</strong><br/>
            <code>test ✅ → build ✅ → scan ✅ → deploy ✅ → smoke ✅</code>
          </div>
          <div style="margin-top:20px;text-align:center">
            <a href="${CI_BUILD_LINK}"
               style="display:inline-block;padding:10px 24px;background:#2563eb;color:#fff;
                      text-decoration:none;border-radius:6px;margin-right:8px">
              Pipeline Log
            </a>
            <a href="https://todoapp-kps.akawatmor.com"
               style="display:inline-block;padding:10px 24px;background:#059669;color:#fff;
                      text-decoration:none;border-radius:6px">
              Open Production
            </a>
          </div>
        </body>
        </html>
      content_type: text/html

  # ── 10. Email · Failure notification ───────────────────────────────────────
  - name: email-failure
    image: *email_image
    depends_on:
      - quality-backend
      - quality-frontend
      - build-push-core
      - build-push-web
      - trivy-scan
      - deploy-k3s
      - smoke-test
    when:
      - event: push
        branch: main
        status: [failure]
    settings:
      host:
        from_secret: SMTP_HOST
      port: 587
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_PASSWORD
      from:
        from_secret: SMTP_USERNAME
      recipients:
        from_secret: NOTIFY_EMAIL
      recipients_only: true
      subject: >-
        ❌ [KPS] Pipeline FAILED — ${CI_REPO_NAME}
        @ ${CI_COMMIT_BRANCH}:${CI_COMMIT_SHA:0:7}
      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
                     max-width:600px;margin:0 auto;padding:24px;color:#1f2937">
          <div style="background:#fef2f2;border-left:4px solid #ef4444;padding:16px;margin-bottom:24px">
            <h2 style="color:#dc2626;margin:0">❌ Pipeline Failed</h2>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px">
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;width:120px">Repository</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_REPO_NAME}</code></td>
            </tr>
            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Branch</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_BRANCH}</code></td>
            </tr>
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Commit</td>
              <td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_SHA:0:7}</code></td>
            </tr>
            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Author</td>
              <td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_AUTHOR}</td>
            </tr>
            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Message</td>
              <td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_MESSAGE}</td>
            </tr>
          </table>
          <div style="margin-top:20px;padding:16px;background:#fefce8;border-radius:8px;font-size:14px">
            ⚠️ <strong>Production ยังใช้ version เดิม</strong> — ไม่มีผลกระทบต่อ end-users
          </div>
          <div style="margin-top:20px;text-align:center">
            <a href="${CI_BUILD_LINK}"
               style="display:inline-block;padding:10px 24px;background:#dc2626;color:#fff;
                      text-decoration:none;border-radius:6px">
              ดู Pipeline Log เพื่อหาสาเหตุ
            </a>
          </div>
        </body>
        </html>
      content_type: text/html
