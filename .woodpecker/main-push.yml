# ─────────────────────────────────────────────────────────────────────────────
# Woodpecker Pipeline — Main Branch Push (Production Deployment)
# ─────────────────────────────────────────────────────────────────────────────

variables:
  - &go_image "golang:1.25-bookworm"
  - &node_image "node:22-bookworm-slim"
  - &alpine_image "alpine:3.20"
  - &kubectl_image "alpine/k8s:1.31.0"
  - &trivy_image "aquasec/trivy:0.69.3"
  - &buildx_image "woodpeckerci/plugin-docker-buildx:4"
  - &gitleaks_image "zricethezav/gitleaks:v8.18.4"
  - &hadolint_image "hadolint/hadolint:v2.12.0-alpine"
  - &kubescore_img "zegl/kube-score:v1.17.0"
  - &conftest_image "openpolicyagent/conftest:v0.50.0"
  - &k6_image "grafana/k6:0.52.0"
  - &email_image "drillster/drone-email:1.2.4"

when:
  event: push
  branch: main

steps:
  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 0 — PRE-FLIGHT CHECKS                                            ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: secret-scan
    image: *gitleaks_image
    depends_on: []
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose --redact --exit-code 1 --no-banner

  - name: dockerfile-lint
    image: *hadolint_image
    depends_on: []
    commands:
      - hadolint --failure-threshold warning src/phase2-final/backend/Dockerfile
      - hadolint --failure-threshold warning src/phase2-final/frontend/Dockerfile

  - name: k8s-lint
    image: *kubescore_img
    depends_on: []
    commands:
      - |
        kube-score score $(ls src/phase2-final/k8s/*.yaml | grep -v '\.sample\.yaml') \
          --ignore-test pod-networkpolicy \
          --ignore-test container-security-context-user-group-id \
          --ignore-test container-image-tag \
          --ignore-test deployment-has-host-podantiaffinity \
          --output-format ci

  - name: opa-policy
    image: *conftest_image
    depends_on: []
    commands:
      - |
        if [ ! -d policies ] || [ -z "$(ls -A policies/*.rego 2>/dev/null)" ]; then
          echo "⚠ No policies/ directory or .rego files found — skipping"
          exit 0
        fi
      - conftest test src/phase2-final/k8s/ --policy policies/ --all-namespaces

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — QUALITY GATES                                                 ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: quality-backend
    image: *go_image
    depends_on: [secret-scan, dockerfile-lint, k8s-lint, opa-policy]
    environment:
      GOMODCACHE: /cache/go/mod
      GOCACHE: /cache/go/build
      GOBIN: /cache/go/bin
      MIN_COVERAGE: "30"
    commands:
      - export PATH="/cache/go/bin:$PATH"
      - mkdir -p /cache/go/mod /cache/go/build /cache/go/bin
      - cd src/phase2-final/backend
      - go mod download
      - go test ./... -v -count=1 -race -coverprofile=coverage.out
      - go tool cover -func=coverage.out
      - |
        COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
        awk -v c="$COV" -v m="$MIN_COVERAGE" 'BEGIN { exit !(c >= m) }' || exit 1
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - gosec -severity medium -confidence medium -fmt=text ./...
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - govulncheck ./...

  - name: quality-frontend
    image: *node_image
    depends_on: [secret-scan, dockerfile-lint, k8s-lint, opa-policy]
    environment:
      NPM_CONFIG_CACHE: /cache/npm
    commands:
      - mkdir -p /cache/npm
      - cd src/phase2-final/frontend
      - npm ci --prefer-offline --cache /cache/npm
      - npm run type-check
      - npm test -- --passWithNoTests --coverage

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2 — INTEGRATION TEST                                             ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: integration-test
    image: *go_image
    depends_on: [quality-backend, quality-frontend]
    environment:
      DATABASE_URL: "postgres://test:test@postgres:5432/test?sslmode=disable"
      GOMODCACHE: /cache/go/mod
      GOCACHE: /cache/go/build
    commands:
      - cd src/phase2-final/backend
      - apt-get update -qq && apt-get install -y -qq postgresql-client
      - |
        for i in $(seq 1 30); do
          pg_isready -h postgres -U test && break
          sleep 2
        done
      - go test -tags=integration -v -count=1 ./internal/store/...

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — BUILD & PUSH                                                 ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: build-push-core
    image: *buildx_image
    privileged: true
    depends_on: [integration-test]
    settings:
      dockerfile: src/phase2-final/backend/Dockerfile
      context: src/phase2-final/backend
      repo: akawatmor/todoapp-core
      tags: ["${CI_COMMIT_SHA:0:7}", latest]
      username: { from_secret: DOCKER_USERNAME }
      password: { from_secret: DOCKER_PASSWORD }

  - name: build-push-web
    image: *buildx_image
    privileged: true
    depends_on: [integration-test]
    settings:
      dockerfile: src/phase2-final/frontend/Dockerfile
      context: src/phase2-final/frontend
      repo: akawatmor/todoapp-web
      tags: ["${CI_COMMIT_SHA:0:7}", latest]
      username: { from_secret: DOCKER_USERNAME }
      password: { from_secret: DOCKER_PASSWORD }

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — SECURITY SCAN (Trivy, Cosign, SBOM)                          ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: sign-and-scan
    image: alpine:3.20
    depends_on: [build-push-core, build-push-web]
    environment:
      COSIGN_PRIVATE_KEY: { from_secret: COSIGN_PRIVATE_KEY }
      COSIGN_PASSWORD: { from_secret: COSIGN_PASSWORD }
      DOCKER_USERNAME: { from_secret: DOCKER_USERNAME }
      DOCKER_PASSWORD: { from_secret: DOCKER_PASSWORD }
    commands:
      - apk add --no-cache curl ca-certificates bash tar
      - curl -sSL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/download/v2.4.0/cosign-linux-amd64
      - chmod +x /usr/local/bin/cosign
      - curl -sSL https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz | tar xz -C /usr/local/bin/
      - echo "$DOCKER_PASSWORD" | cosign login -u "$DOCKER_USERNAME" --password-stdin docker.io
      - export IMAGE_TAG="${CI_COMMIT_SHA:0:7}"
      - |
        # Helper to sign and scan images
        process_image() {
          repo="$1"; tag="$2"
          # 1. Sign
          printf '%s' "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
          cosign sign --yes --key /tmp/cosign.key "$repo:$tag"
          # 2. SBOM
          trivy image --format cyclonedx --output sbom.json "$repo:$tag"
          cosign attach sbom --sbom sbom.json "$repo:$tag"
          # 3. Scan
          trivy image --exit-code 1 --severity HIGH,CRITICAL "$repo:$tag"
        }
        process_image akawatmor/todoapp-core "$IMAGE_TAG"
        process_image akawatmor/todoapp-web "$IMAGE_TAG"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — DB OPERATIONS                                                ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: db-prep
    image: *kubectl_image
    depends_on: [sign-and-scan]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
      PG_USER: { from_secret: PG_USER }
      PG_DATABASE: { from_secret: PG_DATABASE }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - SNAP="/cache/db-backups/pre-${CI_COMMIT_SHA:0:7}.sql.gz"
      - kubectl exec -n todoapp todoapp-postgres-0 -- pg_dump -U "$PG_USER" "$PG_DATABASE" | gzip > "$SNAP"
      - 'echo "✅ Snapshot: $SNAP"'

  - name: migration-test
    image: *go_image
    depends_on: [sign-and-scan]
    commands:
      - go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - export DB="postgres://test:test@pg-test:5432/test?sslmode=disable"
      - cd src/phase2-final/backend
      - migrate -path migrations -database "$DB" up
      - migrate -path migrations -database "$DB" down -all
      - migrate -path migrations -database "$DB" up

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 6 — CANARY DEPLOY                                                ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: apply-cluster-manifests
    image: *kubectl_image
    depends_on: [db-prep, migration-test]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - |
        # Apply static cluster resources without resetting running app images.
        for manifest in \
          src/phase2-final/k8s/namespace.yaml \
          src/phase2-final/k8s/configmap.yaml \
          src/phase2-final/k8s/core-service.yaml \
          src/phase2-final/k8s/core-services.yaml \
          src/phase2-final/k8s/web-service.yaml \
          src/phase2-final/k8s/postgres-service.yaml \
          src/phase2-final/k8s/postgres-pv.yaml \
          src/phase2-final/k8s/postgres-pvc.yaml \
          src/phase2-final/k8s/postgres-statefulset.yaml \
          src/phase2-final/k8s/networkpolicy.yaml \
          src/phase2-final/k8s/pdb.yaml \
          src/phase2-final/k8s/pdb-hpa.yaml \
          src/phase2-final/k8s/ingress.yaml \
          src/phase2-final/k8s/traefik-routing.yaml
        do
          kubectl apply -f "$manifest"
        done

  - name: monitoring-bootstrap
    image: *kubectl_image
    depends_on: [apply-cluster-manifests]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
      GRAFANA_ADMIN_USER: { from_secret: GRAFANA_ADMIN_USER }
      GRAFANA_ADMIN_PASSWORD: { from_secret: GRAFANA_ADMIN_PASSWORD }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - ': "${GRAFANA_ADMIN_USER:?missing GRAFANA_ADMIN_USER secret}"'
      - ': "${GRAFANA_ADMIN_PASSWORD:?missing GRAFANA_ADMIN_PASSWORD secret}"'
      - kubectl apply -f src/phase2-final/monitoring/namespace.yaml
      - |
        kubectl create secret generic kps-grafana-admin \
          -n monitoring \
          --from-literal=admin-user="$GRAFANA_ADMIN_USER" \
          --from-literal=admin-password="$GRAFANA_ADMIN_PASSWORD" \
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f src/phase2-final/monitoring/traefik-helmchartconfig.yaml
      - kubectl apply -f src/phase2-final/monitoring/kube-prometheus-stack.yaml
      - |
        for crd in servicemonitors.monitoring.coreos.com prometheusrules.monitoring.coreos.com; do
          for i in $(seq 1 40); do
            if kubectl get crd "$crd" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for monitoring CRD $crd ($i/40)"
            sleep 15
          done
          kubectl get crd "$crd" >/dev/null 2>&1 || exit 1
        done
      - |
        GRAFANA_DEPLOY=""
        OPERATOR_DEPLOY=""
        PROM_STS=""
        for i in $(seq 1 40); do
          GRAFANA_DEPLOY=$(kubectl -n monitoring get deploy -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep 'grafana' | head -n 1 || true)
          OPERATOR_DEPLOY=$(kubectl -n monitoring get deploy -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep 'operator' | head -n 1 || true)
          PROM_STS=$(kubectl -n monitoring get statefulset -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep 'prometheus' | head -n 1 || true)
          if [ -n "$GRAFANA_DEPLOY" ] && [ -n "$OPERATOR_DEPLOY" ] && [ -n "$PROM_STS" ]; then
            break
          fi
          echo "Waiting for monitoring workloads ($i/40)"
          sleep 15
        done
        [ -n "$GRAFANA_DEPLOY" ] && [ -n "$OPERATOR_DEPLOY" ] && [ -n "$PROM_STS" ] || {
          kubectl -n monitoring get all
          exit 1
        }
        kubectl -n monitoring rollout status deployment/"$OPERATOR_DEPLOY" --timeout=600s
        kubectl -n monitoring rollout status deployment/"$GRAFANA_DEPLOY" --timeout=600s
        kubectl -n monitoring rollout status statefulset/"$PROM_STS" --timeout=600s

  - name: monitoring-sync
    image: *kubectl_image
    depends_on: [monitoring-bootstrap]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - kubectl apply -f src/phase2-final/k8s/networkpolicy.yaml
      - kubectl delete servicemonitor -n monitoring traefik --ignore-not-found
      - kubectl apply -f src/phase2-final/monitoring/traefik-podmonitor.yaml
      - kubectl apply -f src/phase2-final/monitoring/todoapp-servicemonitor.yaml
      - kubectl apply -f src/phase2-final/monitoring/todoapp-prometheusrule.yaml
      - kubectl apply -f src/phase2-final/monitoring/todoapp-dashboard.yaml
      - |
        TRAEFIK_IP=$(kubectl -n kube-system get svc traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        [ -n "$TRAEFIK_IP" ] || exit 1
        wget -qO- --header="Host: dashboard-kps.akawatmor.com" "http://$TRAEFIK_IP/login" | grep -iq grafana

  - name: iscsi-postgres-health
    image: *kubectl_image
    depends_on: [monitoring-sync]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - |
        dump_state() {
          echo "--- PV ---"
          kubectl get pv todoapp-postgres-pv -o wide || true
          echo "--- PVC ---"
          kubectl -n todoapp get pvc data-todoapp-postgres-0 -o wide || true
          echo "--- StatefulSet ---"
          kubectl -n todoapp get statefulset todoapp-postgres -o wide || true
          echo "--- Pod ---"
          kubectl -n todoapp get pod todoapp-postgres-0 -o wide || true
          echo "--- Pod Describe ---"
          kubectl -n todoapp describe pod todoapp-postgres-0 || true
          echo "--- Recent Events ---"
          kubectl -n todoapp get events --sort-by=.lastTimestamp | tail -n 40 || true
        }

        fail() {
          echo "❌ iSCSI-backed Postgres is not healthy"
          dump_state
          exit 1
        }

        PV_PHASE=$(kubectl get pv todoapp-postgres-pv -o jsonpath='{.status.phase}' 2>/dev/null || true)
        PVC_PHASE=$(kubectl -n todoapp get pvc data-todoapp-postgres-0 -o jsonpath='{.status.phase}' 2>/dev/null || true)

        [ "$PV_PHASE" = "Bound" ] || fail
        [ "$PVC_PHASE" = "Bound" ] || fail
        kubectl -n todoapp rollout status statefulset/todoapp-postgres --timeout=180s || fail
        kubectl -n todoapp wait --for=condition=Ready pod/todoapp-postgres-0 --timeout=120s || fail
        kubectl -n todoapp exec todoapp-postgres-0 -- sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' || fail
        echo "✅ iSCSI-backed Postgres is healthy"

  - name: canary-deploy
    image: *kubectl_image
    depends_on: [iscsi-postgres-health]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - kubectl set image deployment/todoapp-core-canary core=akawatmor/todoapp-core:${CI_COMMIT_SHA:0:7} -n todoapp
      - kubectl rollout status deployment/todoapp-core-canary -n todoapp --timeout=180s
      - |
        kubectl patch traefikservice todoapp-core-weighted -n todoapp --type=merge -p '
        {"spec":{"weighted":{"services":[
          {"name":"todoapp-core-stable","port":8080,"weight":90},
          {"name":"todoapp-core-canary","port":8080,"weight":10}
        ]}}}'
      - 'echo "🐤 Canary: 10%"'

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 7 — CANARY ANALYSIS                                              ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: canary-analyze
    image: *kubectl_image
    depends_on: [canary-deploy]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - apk add --no-cache curl jq
      - sleep 30
      - |
        # Verify the canary via backend health endpoints and Prometheus metrics.
        kubectl port-forward svc/todoapp-core-canary 8080:8080 -n todoapp >/tmp/canary-port-forward.log 2>&1 &
        PF_PID=$!

        PROM_SERVICE=$(kubectl -n monitoring get svc -l app.kubernetes.io/name=prometheus -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
        [ -n "$PROM_SERVICE" ] || {
          echo "❌ Prometheus service not found"
          kubectl -n monitoring get svc
          exit 1
        }
        kubectl port-forward -n monitoring svc/"$PROM_SERVICE" 9090:9090 >/tmp/prometheus-port-forward.log 2>&1 &
        PROM_PID=$!

        cleanup() {
          if kill -0 "$PF_PID" 2>/dev/null; then
            kill "$PF_PID" 2>/dev/null || true
            wait "$PF_PID" 2>/dev/null || true
          fi
          if kill -0 "$PROM_PID" 2>/dev/null; then
            kill "$PROM_PID" 2>/dev/null || true
            wait "$PROM_PID" 2>/dev/null || true
          fi
        }

        wait_for_json() {
          path="$1"
          expected="$2"
          label="$3"
          attempt=1

          while [ "$attempt" -le 20 ]; do
            response=$(curl -fsS "http://127.0.0.1:8080$path" 2>/tmp/canary-curl.err) || response=""
            if [ -n "$response" ] && printf '%s' "$response" | grep -q "$expected"; then
              echo "✅ $label check passed"
              return 0
            fi

            if ! kill -0 "$PF_PID" 2>/dev/null; then
              echo "❌ port-forward exited before $label succeeded"
              cat /tmp/canary-port-forward.log
              exit 1
            fi

            sleep 3
            attempt=$((attempt + 1))
          done

          echo "❌ $label check failed"
          cat /tmp/canary-curl.err 2>/dev/null || true
          [ -f /tmp/canary-port-forward.log ] && cat /tmp/canary-port-forward.log
          exit 1
        }

        wait_for_prometheus() {
          attempt=1
          while [ "$attempt" -le 20 ]; do
            if curl -fsS http://127.0.0.1:9090/-/ready >/dev/null 2>&1; then
              return 0
            fi
            sleep 3
            attempt=$((attempt + 1))
          done
          echo "❌ Prometheus is not ready"
          cat /tmp/prometheus-port-forward.log 2>/dev/null || true
          exit 1
        }

        query_scalar() {
          expr="$1"
          curl -fsS --get http://127.0.0.1:9090/api/v1/query \
            --data-urlencode "query=$expr" | jq -r '.data.result[0].value[1] // "0"'
        }

        wait_for_nonzero() {
          expr="$1"
          label="$2"
          attempt=1
          while [ "$attempt" -le 20 ]; do
            value=$(query_scalar "$expr")
            if awk -v v="$value" 'BEGIN { exit !(v > 0) }'; then
              echo "✅ $label metric observed: $value"
              return 0
            fi
            sleep 6
            attempt=$((attempt + 1))
          done
          echo "❌ $label metric did not become non-zero"
          exit 1
        }

        trap cleanup EXIT
        wait_for_json /healthz '"status":"ok"' healthz
        wait_for_json /readyz '"status":"ready"' readyz
        wait_for_json /api/v1/meta '"name":"TodoApp"' meta

        wait_for_prometheus

        TRAEFIK_IP=$(kubectl -n kube-system get svc traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        [ -n "$TRAEFIK_IP" ] || {
          echo "❌ Traefik load balancer IP missing"
          exit 1
        }

        echo "🔥 Generating canary traffic through the weighted route"
        for _ in $(seq 1 80); do
          curl -fsS --max-time 10 -H "Host: todoapp-kps.akawatmor.com" "http://$TRAEFIK_IP/api/v1/meta" >/dev/null
          curl -fsS --max-time 10 -H "Host: todoapp-kps.akawatmor.com" "http://$TRAEFIK_IP/healthz" >/dev/null
        done

        wait_for_nonzero 'sum(increase(todoapp_http_requests_total{track="canary"}[3m]))' 'canary request volume'

        CANARY_ERRORS=$(query_scalar 'sum(increase(todoapp_http_requests_total{track="canary",status_class="5xx"}[3m]))')
        CANARY_P95=$(query_scalar 'histogram_quantile(0.95, sum(rate(todoapp_http_request_duration_seconds_bucket{track="canary"}[3m])) by (le))')
        STABLE_P95=$(query_scalar 'histogram_quantile(0.95, sum(rate(todoapp_http_request_duration_seconds_bucket{track="stable"}[3m])) by (le))')

        echo "Canary 5xx count: $CANARY_ERRORS"
        echo "Canary p95 latency: $CANARY_P95"
        echo "Stable p95 latency: $STABLE_P95"

        awk -v v="$CANARY_ERRORS" 'BEGIN { exit !(v <= 0) }' || {
          echo "❌ Canary observed 5xx traffic"
          exit 1
        }

        awk -v v="$CANARY_P95" 'BEGIN { exit !(v <= 1.5) }' || {
          echo "❌ Canary p95 latency exceeded 1.5s"
          exit 1
        }

        if awk -v stable="$STABLE_P95" 'BEGIN { exit !(stable > 0) }'; then
          awk -v canary="$CANARY_P95" -v stable="$STABLE_P95" 'BEGIN { exit !(canary <= stable * 1.5) }' || {
            echo "❌ Canary p95 latency is more than 1.5x stable"
            exit 1
          }
        fi

        echo "✅ Analysis passed"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 8 — PROMOTE OR ROLLBACK                                          ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: promote-stable
    image: *kubectl_image
    depends_on: [canary-analyze]
    when: { status: [success] }
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - kubectl set image deployment/todoapp-core-stable core=akawatmor/todoapp-core:${CI_COMMIT_SHA:0:7} -n todoapp
      - kubectl rollout status deployment/todoapp-core-stable -n todoapp
      - |
        kubectl patch traefikservice todoapp-core-weighted -n todoapp --type=merge -p '
        {"spec":{"weighted":{"services":[
          {"name":"todoapp-core-stable","port":8080,"weight":100},
          {"name":"todoapp-core-canary","port":8080,"weight":0}
        ]}}}'
      - kubectl set image deployment/todoapp-web web=akawatmor/todoapp-web:${CI_COMMIT_SHA:0:7} -n todoapp
      - echo "🎉 Promoted to 100%"

  - name: auto-rollback
    image: *kubectl_image
    depends_on: [canary-analyze]
    when: { status: [failure] }
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - |
        kubectl patch traefikservice todoapp-core-weighted -n todoapp --type=merge -p '
        {"spec":{"weighted":{"services":[
          {"name":"todoapp-core-stable","port":8080,"weight":100},
          {"name":"todoapp-core-canary","port":8080,"weight":0}
        ]}}}'
      - kubectl scale deployment/todoapp-core-canary --replicas=0 -n todoapp
      - echo "🚨 Rollback complete"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 9 — VERIFICATION                                                 ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: smoke-test
    image: *kubectl_image
    depends_on: [promote-stable]
    environment:
      KUBECONFIG_B64: { from_secret: KUBECONFIG_B64 }
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - apk add --no-cache curl ca-certificates
      - |
        TRAEFIK_IP=$(kubectl -n kube-system get svc traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

        if [ -z "$TRAEFIK_IP" ]; then
          echo "❌ traefik service has no load balancer IP"
          kubectl -n kube-system get svc traefik -o wide
          exit 1
        fi

        echo "🌐 Verifying Traefik via MetalLB IP: $TRAEFIK_IP"
        curl -fsS --max-time 20 -H "Host: todoapp-kps.akawatmor.com" "http://$TRAEFIK_IP/healthz" | grep '"status":"ok"'

        echo "🌍 Verifying public backend health"
        curl -fsS --max-time 20 https://todoapp-kps.akawatmor.com/healthz | grep '"status":"ok"'

        echo "🖥 Verifying public frontend root"
        curl -fsS --max-time 20 https://todoapp-kps.akawatmor.com/ | grep '<title>TodoApp'
      - echo "✅ Smoke test passed"

  - name: create-release-tag
    image: *alpine_image
    depends_on: [smoke-test]
    when: { status: [success] }
    environment:
      GITHUB_TOKEN: { from_secret: GITHUB_TOKEN }
    commands:
      - apk add --no-cache git
      - ': "${GITHUB_TOKEN:?missing GITHUB_TOKEN secret}"'
      - git fetch --tags origin
      - chmod +x src/phase2-final/scripts/release/release-plan.sh
      - src/phase2-final/scripts/release/release-plan.sh "$CI_COMMIT_SHA" > /tmp/release.env
      - . /tmp/release.env
      - |
        if [ "$RELEASE_BUMP" = "skip" ]; then
          echo "ℹ Commit is not flagged for release tagging"
          exit 0
        fi
      - |
        if git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
          echo "ℹ Release tag $RELEASE_TAG already exists"
          exit 0
        fi
      - git config user.name "Woodpecker CI"
      - git config user.email "woodpecker@local"
      - git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
      - git push "https://x-access-token:$GITHUB_TOKEN@github.com/Akawatmor/KPS-Enterprise.git" "$RELEASE_TAG"
      - echo "🏷 Created release tag $RELEASE_TAG"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 10 — NOTIFICATIONS                                               ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  - name: email-success
    image: *email_image
    depends_on: [create-release-tag]
    failure: ignore
    when:
      - event: push
        branch: main
        status: [success]
    settings:
      host: { from_secret: SMTP_HOST }
      port: 587
      username: { from_secret: SMTP_USERNAME }
      password: { from_secret: SMTP_PASSWORD }
      from: { from_secret: SMTP_USERNAME }
      recipients: { from_secret: NOTIFY_EMAIL }
      recipients_only: true
      content_type: text/html
      subject: >-
        ✅ [KPS] Deployment Success — ${CI_REPO_NAME}@${CI_COMMIT_SHA:0:7}
      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:700px;margin:0 auto;padding:24px;color:#111827">
          <div style="background:#ecfdf5;border-left:4px solid #10b981;padding:20px;border-radius:8px;margin-bottom:24px">
            <h2 style="margin:0;color:#047857">✅ Deployment Succeeded</h2>
            <p style="margin:8px 0 0;color:#065f46">Production checks passed and release-tag stage completed.</p>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:20px">
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;width:160px">Repository</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_REPO_NAME}</td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Branch</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_BRANCH}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Commit</td><td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_SHA:0:7}</code></td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Author</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_AUTHOR}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Message</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_MESSAGE}</td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">App URL</td><td style="padding:10px;border:1px solid #e5e7eb"><a href="https://todoapp-kps.akawatmor.com">https://todoapp-kps.akawatmor.com</a></td></tr>
          </table>
          <div style="background:#f9fafb;padding:14px 16px;border-radius:8px;margin-bottom:20px;font-size:13px;line-height:1.7">
            preflight ✅ → quality ✅ → integration ✅ → build ✅ → security ✅ → deploy ✅ → smoke ✅ → release-tag ✅
          </div>
          <div style="text-align:center">
            <a href="${CI_BUILD_LINK}" style="display:inline-block;padding:11px 22px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600">Open Pipeline</a>
          </div>
        </body>
        </html>

  - name: email-rollback
    image: *email_image
    depends_on: [auto-rollback]
    failure: ignore
    when:
      - event: push
        branch: main
        status: [failure]
    settings:
      host: { from_secret: SMTP_HOST }
      port: 587
      username: { from_secret: SMTP_USERNAME }
      password: { from_secret: SMTP_PASSWORD }
      from: { from_secret: SMTP_USERNAME }
      recipients: { from_secret: NOTIFY_EMAIL }
      recipients_only: true
      content_type: text/html
      subject: >-
        🚨 [KPS] AUTO-ROLLBACK — ${CI_REPO_NAME}@${CI_COMMIT_SHA:0:7}
      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:700px;margin:0 auto;padding:24px;color:#111827">
          <div style="background:#fef2f2;border-left:4px solid #ef4444;padding:20px;border-radius:8px;margin-bottom:24px">
            <h2 style="margin:0;color:#b91c1c">🚨 Auto-Rollback Executed</h2>
            <p style="margin:8px 0 0;color:#991b1b">Canary analysis failed and production traffic was restored to the previous stable release.</p>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:20px">
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;width:160px">Repository</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_REPO_NAME}</td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Branch</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_BRANCH}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Commit</td><td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_SHA:0:7}</code></td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Author</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_AUTHOR}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Impact</td><td style="padding:10px;border:1px solid #e5e7eb">Production should still be serving the previous stable image.</td></tr>
          </table>
          <div style="text-align:center">
            <a href="${CI_BUILD_LINK}" style="display:inline-block;padding:11px 22px;background:#dc2626;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600">Open Failed Pipeline</a>
          </div>
        </body>
        </html>

  - name: email-failure
    image: *email_image
    failure: ignore
    when:
      - event: push
        branch: main
        status: [failure]
    settings:
      host: { from_secret: SMTP_HOST }
      port: 587
      username: { from_secret: SMTP_USERNAME }
      password: { from_secret: SMTP_PASSWORD }
      from: { from_secret: SMTP_USERNAME }
      recipients: { from_secret: NOTIFY_EMAIL }
      recipients_only: true
      content_type: text/html
      subject: >-
        ❌ [KPS] Pipeline Failed — ${CI_REPO_NAME}@${CI_COMMIT_SHA:0:7}
      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:700px;margin:0 auto;padding:24px;color:#111827">
          <div style="background:#fef2f2;border-left:4px solid #ef4444;padding:20px;border-radius:8px;margin-bottom:24px">
            <h2 style="margin:0;color:#b91c1c">❌ Pipeline Failed</h2>
            <p style="margin:8px 0 0;color:#991b1b">The pipeline failed before completing all gates. Review the log and rerun after the fix.</p>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:20px">
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600;width:160px">Repository</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_REPO_NAME}</td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Branch</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_BRANCH}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Commit</td><td style="padding:10px;border:1px solid #e5e7eb"><code>${CI_COMMIT_SHA:0:7}</code></td></tr>
            <tr><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Author</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_AUTHOR}</td></tr>
            <tr style="background:#f9fafb"><td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">Message</td><td style="padding:10px;border:1px solid #e5e7eb">${CI_COMMIT_MESSAGE}</td></tr>
          </table>
          <div style="text-align:center">
            <a href="${CI_BUILD_LINK}" style="display:inline-block;padding:11px 22px;background:#dc2626;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600">Open Failed Pipeline</a>
          </div>
        </body>
        </html>

services:
  - name: postgres
    image: postgres:16-alpine
