# =============================================================================
# FILE: .woodpecker.notify.yaml
#
# Responsibility:
# - Centralized notifications
# - Success / rollback / pre-deploy failure
# - Non-blocking
# - Clean state-driven notification model
#
# IMPORTANT:
# This pipeline should ONLY send notifications.
# No deploy/build/test logic here.
# =============================================================================

variables:
  - &email_image "drillster/drone-email:1.2.4"

steps:

# =============================================================================
# SUCCESS — FULL DEPLOY SUCCESS
# =============================================================================

  - name: email-success
    image: *email_image

    failure: ignore

    when:
      event: [push]
      branch: [main]
      status: [success]

    settings:
      host:
        from_secret: SMTP_HOST

      port: 587

      username:
        from_secret: SMTP_USERNAME

      password:
        from_secret: SMTP_PASSWORD

      from:
        from_secret: SMTP_USERNAME

      recipients:
        from_secret: NOTIFY_EMAIL

      recipients_only: true

      content_type: text/html

      subject: >-
        ✅ [TODOAPP] Production deployment succeeded — ${CI_COMMIT_SHA:0:7}

      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                     max-width:700px;
                     margin:0 auto;
                     padding:24px;
                     color:#111827">

          <div style="background:#ecfdf5;
                      border-left:4px solid #10b981;
                      padding:20px;
                      border-radius:8px;
                      margin-bottom:24px">

            <h2 style="margin:0;color:#047857">
              ✅ Production Deployment Successful
            </h2>

            <p style="margin-top:10px;color:#065f46;font-size:14px">
              Canary verification passed and production traffic has been promoted
              successfully.
            </p>
          </div>

          <h3 style="margin-bottom:12px">Deployment Summary</h3>

          <table style="width:100%;
                        border-collapse:collapse;
                        font-size:14px">

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Repository
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_REPO_NAME}
              </td>
            </tr>

            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Commit
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                <code>${CI_COMMIT_SHA}</code>
              </td>
            </tr>

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Author
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_AUTHOR}
              </td>
            </tr>

            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Branch
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_BRANCH}
              </td>
            </tr>

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Message
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_MESSAGE}
              </td>
            </tr>

          </table>

          <div style="margin-top:24px;
                      padding:16px;
                      background:#eff6ff;
                      border-radius:8px;
                      font-size:14px">

            <b>Deployment Flow</b>

            <pre style="margin-top:10px;
                        overflow:auto;
                        background:#ffffff;
                        padding:12px;
                        border-radius:6px;
                        font-size:12px"> PRECHECK → QUALITY → INTEGRATION → BUILD → SECURITY → CANARY → VERIFY → PROMOTE → SMOKE TEST
            </pre>
          </div>

          <div style="margin-top:28px;text-align:center">

            <a href="${CI_BUILD_LINK}"
               style="display:inline-block;
                      padding:12px 24px;
                      background:#2563eb;
                      color:#ffffff;
                      text-decoration:none;
                      border-radius:8px;
                      margin-right:8px">

              Open Pipeline Logs

            </a>

            <a href="https://todoapp-kps.akawatmor.com"
               style="display:inline-block;
                      padding:12px 24px;
                      background:#059669;
                      color:#ffffff;
                      text-decoration:none;
                      border-radius:8px">

              Open Production

            </a>

          </div>

        </body>
        </html>

# =============================================================================
# FAILURE — PRE-DEPLOY FAILURE
# =============================================================================

  - name: email-predeploy-failure
    image: *email_image

    failure: ignore

    when:
      event: [push]
      branch: [main]
      status: [failure]

    settings:
      host:
        from_secret: SMTP_HOST

      port: 587

      username:
        from_secret: SMTP_USERNAME

      password:
        from_secret: SMTP_PASSWORD

      from:
        from_secret: SMTP_USERNAME

      recipients:
        from_secret: NOTIFY_EMAIL

      recipients_only: true

      content_type: text/html

      subject: >-
        ❌ [TODOAPP] Pipeline failed before deployment — ${CI_COMMIT_SHA:0:7}

      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                     max-width:700px;
                     margin:0 auto;
                     padding:24px;
                     color:#111827">

          <div style="background:#fef2f2;
                      border-left:4px solid #ef4444;
                      padding:20px;
                      border-radius:8px;
                      margin-bottom:24px">

            <h2 style="margin:0;color:#b91c1c">
              ❌ Pipeline Failed Before Production Deploy
            </h2>

            <p style="margin-top:10px;color:#991b1b;font-size:14px">
              Production deployment was NOT executed.
            </p>

          </div>

          <div style="padding:16px;
                      background:#f9fafb;
                      border-radius:8px;
                      font-size:14px">

            <b>Possible Failure Area</b>

            <ul style="margin-top:10px;line-height:1.8">
              <li>Secret scanning</li>
              <li>Linting</li>
              <li>Policy validation</li>
              <li>Unit tests</li>
              <li>Integration tests</li>
              <li>Docker build</li>
              <li>Container vulnerability scan</li>
            </ul>

          </div>

          <table style="width:100%;
                        border-collapse:collapse;
                        margin-top:24px;
                        font-size:14px">

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Commit
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                <code>${CI_COMMIT_SHA}</code>
              </td>
            </tr>

            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Author
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_AUTHOR}
              </td>
            </tr>

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Branch
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_BRANCH}
              </td>
            </tr>

          </table>

          <div style="margin-top:28px;text-align:center">

            <a href="${CI_BUILD_LINK}"
               style="display:inline-block;
                      padding:12px 24px;
                      background:#dc2626;
                      color:#ffffff;
                      text-decoration:none;
                      border-radius:8px">

              Open Failure Logs

            </a>

          </div>

        </body>
        </html>

# =============================================================================
# ROLLBACK EXECUTED
# =============================================================================

  - name: email-rollback
    image: *email_image

    failure: ignore

    when:
      event: [push]
      branch: [main]
      status: [failure]

    settings:
      host:
        from_secret: SMTP_HOST

      port: 587

      username:
        from_secret: SMTP_USERNAME

      password:
        from_secret: SMTP_PASSWORD

      from:
        from_secret: SMTP_USERNAME

      recipients:
        from_secret: NOTIFY_EMAIL

      recipients_only: true

      content_type: text/html

      subject: >-
        🚨 [TODOAPP] Auto rollback executed — ${CI_COMMIT_SHA:0:7}

      body: |
        <html>
        <body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                     max-width:700px;
                     margin:0 auto;
                     padding:24px;
                     color:#111827">

          <div style="background:#fff7ed;
                      border-left:4px solid #f97316;
                      padding:20px;
                      border-radius:8px;
                      margin-bottom:24px">

            <h2 style="margin:0;color:#c2410c">
              🚨 Auto Rollback Executed
            </h2>

            <p style="margin-top:10px;color:#9a3412;font-size:14px">
              Canary deployment verification failed and traffic has been restored
              to the previous stable release.
            </p>

          </div>

          <div style="padding:16px;
                      background:#f0fdf4;
                      border-radius:8px;
                      font-size:14px">

            ✅ Production protection mechanisms worked correctly.

          </div>

          <h3 style="margin-top:24px">Rollback Actions</h3>

          <ol style="line-height:1.9;font-size:14px">
            <li>Canary traffic stopped</li>
            <li>Stable deployment restored</li>
            <li>Canary replicas scaled down</li>
            <li>Rollback verification completed</li>
          </ol>

          <table style="width:100%;
                        border-collapse:collapse;
                        margin-top:24px;
                        font-size:14px">

            <tr style="background:#f9fafb">
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Failed Commit
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                <code>${CI_COMMIT_SHA}</code>
              </td>
            </tr>

            <tr>
              <td style="padding:10px;border:1px solid #e5e7eb;font-weight:600">
                Author
              </td>

              <td style="padding:10px;border:1px solid #e5e7eb">
                ${CI_COMMIT_AUTHOR}
              </td>
            </tr>

          </table>

          <div style="margin-top:28px;text-align:center">

            <a href="${CI_BUILD_LINK}"
               style="display:inline-block;
                      padding:12px 24px;
                      background:#ea580c;
                      color:#ffffff;
                      text-decoration:none;
                      border-radius:8px">

              Inspect Rollback Logs

            </a>

          </div>

        </body>
        </html>