  #     - |
  #       for i in $(seq 1 30); do
  #         pg_isready -h postgres -U test && break
  #         sleep 2
  #       done

  #     - cd src/phase2-final/backend

  #     - go test -tags=integration ./internal/store/... -v

  - name: integration-test
    image: *go_image
    depends_on:
      - quality-gate
    environment:
      DATABASE_URL: postgres://test:test@postgres:5432/test?sslmode=disable
    commands:
      # 1. ติดตั้ง netcat-openbsd แบบด่วนเพื่อใช้เช็ค DB ชัวร์ๆ (เร็วกว่าโหลด postgresql-client มาก)
      - apt-get update -qq && apt-get install -y -qq netcat-openbsd
      - |
        echo "Waiting for postgres..."
        for i in $(seq 1 30); do
          if nc -z postgres 5432; then
            echo "Postgres is up!"
            break
          fi
          sleep 2
        done

      # 2. ใช้ go install -tags เพื่อดึง postgres driver
      - go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - export PATH=$PATH:$(go env GOPATH)/bin
      
      # 3. ตรวจสอบว่ามีโฟลเดอร์ migrations อยู่จริงก่อนรัน
      - cd src/phase2-final/backend
      - ls -la migrations/ || echo "WARNING: migrations folder missing or empty!"
      
      # 4. รัน Migration 
      - migrate -path migrations -database "$DATABASE_URL" up

      # 5. รัน Integration Test
      - go test -tags=integration ./internal/store/... -v

