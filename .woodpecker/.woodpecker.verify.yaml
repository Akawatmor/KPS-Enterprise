      - /migrate -path src/phase2-final/backend/migrations -database "postgres://test:test@postgres:5432/test?sslmode=disable" down -all
      - /migrate -path src/phase2-final/backend/migrations -database "postgres://test:test@postgres:5432/test?sslmode=disable" up