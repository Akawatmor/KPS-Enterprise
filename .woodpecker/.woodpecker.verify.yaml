when:
  - event: [push, pull_request]

variables:
  - &go_image "golang:1.25-bookworm"
  - &node_image "node:22-bookworm-slim"
  - &kubectl_image "alpine/k8s:1.31.0"
  - &trivy_image "aquasec/trivy:0.69.3"
  - &buildx_image "woodpeckerci/plugin-docker-buildx:4"
  - &cosign_image "ghcr.io/sigstore/cosign/cosign:v2.4.0"
  - &gitleaks_image "zricethezav/gitleaks:latest"
  - &hadolint_image "hadolint/hadolint:latest-debian"
  - &kubescore_image "zegl/kube-score:latest"
  - &conftest_image "openpolicyagent/conftest:latest"
  - &k6_image "grafana/k6:latest"
  - &oasdiff_image "tufin/oasdiff:latest"
  - &email_image "drillster/drone-email"

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test

steps:

# =============================================================================
# PRECHECK
# =============================================================================

  - name: secret-scan
    image: *gitleaks_image
    commands:
      - gitleaks detect --source . --redact --exit-code 1 --no-banner

  - name: dockerfile-lint
    image: *hadolint_image
    depends_on: [secret-scan]
    commands:
      - hadolint src/phase2-final/backend/Dockerfile
      - hadolint src/phase2-final/frontend/Dockerfile

  - name: k8s-lint
    image: *kubescore_image
    depends_on: [dockerfile-lint]
    commands:
      - kube-score score src/phase2-final/k8s/*.yaml --output-format ci --ignore-test container-image-tag --ignore-test container-security-context-user-group-id

  - name: opa-policy
    image: *conftest_image
    depends_on: [k8s-lint]
    commands:
      - |
        if [ -d policies ]; then
          conftest test src/phase2-final/k8s --policy policies
        else
          echo "No policies found"
        fi

# =============================================================================
# QUALITY
# =============================================================================

  - name: quality-backend
    image: *go_image
    depends_on: [opa-policy]

    environment:
      GOMODCACHE: /cache/go/mod
      GOCACHE: /cache/go/build

    commands:
      - mkdir -p /cache/go/mod /cache/go/build

      - cd src/phase2-final/backend

      - go mod download

      - go vet ./...

      - |
        go test ./... \
          -race \
          -cover \
          -coverprofile=coverage.out

  - name: quality-frontend
    image: *node_image
    depends_on: [opa-policy]

    environment:
      NPM_CONFIG_CACHE: /cache/npm

    commands:
      - mkdir -p /cache/npm

      - cd src/phase2-final/frontend

      - npm ci --cache /cache/npm

      - npm run type-check

      - npm test -- --coverage --passWithNoTests

# =============================================================================
# QUALITY GATE
# =============================================================================

  - name: quality-gate
    image: alpine:3.20

    depends_on:
      - quality-backend
      - quality-frontend

    commands:
      - echo "Quality gate passed"

# =============================================================================
# INTEGRATION
# =============================================================================

  # - name: integration-test
  #   image: *go_image

  #   depends_on:
  #     - quality-gate

  #   environment:
  #     DATABASE_URL: postgres://test:test@postgres:5432/test?sslmode=disable

  #   commands:
  #     - apt-get update -qq
